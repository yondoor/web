<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yondoor — The door that knows you</title>
    <meta name="description" content="Open source smart door systems. NFC unlock, delivery flap, capacitive touch exit. No keys, no app, no cloud.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --muted: #888;
            --magenta: #aa00aa;
            --br-magenta: #ff55ff;
            --br-yellow: #ffff55;
            --white: #aaaaaa;
            --accent: #ff55ff;
            --accent-warm: #ffff55;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ASCII Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            max-width: 240px;
            width: 65%;
        }

        .logo-wrap img {
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            display: block;
        }

        /* Twinkle stars */
        @keyframes twinkle {
            0%   { opacity: 0; transform: scale(0); }
            15%  { opacity: 1; transform: scale(1); }
            30%  { opacity: 0; transform: scale(0); }
            100% { opacity: 0; transform: scale(0); }
        }

        .twinkle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: twinkle 3s ease-in-out;
            animation-fill-mode: forwards;
        }

        .t1 { background: #ff55ff; top: 8%;  left: 25%; animation-delay: 0.5s; animation-iteration-count: 3; }
        .t2 { background: #ffff55; top: 22%; left: 70%; animation-delay: 1.2s; animation-iteration-count: 2; }
        .t3 { background: #ffffff; top: 15%; left: 50%; animation-delay: 2.0s; animation-iteration-count: 2; }
        .t4 { background: #ff55ff; top: 35%; left: 35%; animation-delay: 3.5s; animation-iteration-count: 1; }
        .t5 { background: #ffff55; top: 10%; left: 60%; animation-delay: 4.8s; animation-iteration-count: 2; }
        .t6 { background: #ffffff; top: 28%; left: 80%; animation-delay: 6.0s; animation-iteration-count: 1; }

        /* Hero */
        .tagline {
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent-warm);
            margin-bottom: 3rem;
            letter-spacing: 0.05em;
        }

        /* Footer */
        footer {
            text-align: center;
            color: #444;
            font-size: 0.75rem;
            padding-top: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        footer a:hover {
            color: var(--text);
        }

    </style>
</head>
<body>
    <div class="container">

        <div class="logo">
            <div class="logo-wrap">
                <img src="logo.png" alt="Yondoor">
                <span class="twinkle t1"></span>
                <span class="twinkle t2"></span>
                <span class="twinkle t3"></span>
                <span class="twinkle t4"></span>
                <span class="twinkle t5"></span>
                <span class="twinkle t6"></span>
            </div>
        </div>

        <p class="tagline">Touch. Push. You're home.</p>

        <footer>
            <p>Yondoor &mdash; Yorkshire, England</p>
        </footer>

    </div>
</body>
</html>
