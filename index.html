<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yondoor — The door that knows you</title>
    <meta name="description" content="Open source smart door systems. NFC unlock, delivery flap, capacitive touch exit. No keys, no app, no cloud.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --muted: #888;
            --magenta: #aa00aa;
            --br-magenta: #ff55ff;
            --br-yellow: #ffff55;
            --white: #aaaaaa;
            --accent: #ff55ff;
            --accent-warm: #ffff55;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ASCII Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .logo svg {
            max-width: 200px;
            width: 60%;
            height: auto;
        }

        /* Hero */
        .tagline {
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent-warm);
            margin-bottom: 3rem;
            letter-spacing: 0.05em;
        }

        /* Footer */
        footer {
            text-align: center;
            color: #444;
            font-size: 0.75rem;
            padding-top: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        footer a:hover {
            color: var(--text);
        }

    </style>
</head>
<body>
    <div class="container">

        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 260" role="img" aria-label="Yondoor logo">

                @keyframes flap-open { 0%{opacity:.4} 40%{opacity:1} 60%{opacity:1} 100%{opacity:.4} }
                @keyframes drift { 0%{transform:translateX(0)} 50%{transform:translateX(2px)} 100%{transform:translateX(0)} }
                .s1{animation:shimmer 4s ease-in-out infinite}
                .s2{animation:shimmer 4s ease-in-out .5s infinite}
                .s3{animation:shimmer 4s ease-in-out 1s infinite}
                .s4{animation:shimmer 4s ease-in-out 1.5s infinite}
                .fl{animation:flap-open 6s ease-in-out infinite}
                .nm{animation:drift 8s ease-in-out infinite}
              </style>
              <rect width="210" height="260" fill="#0a0a0a"/>
              <rect x="10" y="10" width="190" height="240" rx="4" fill="none" stroke="#555" stroke-width="3"/>
              <!-- Sky: ███ -->
              <g class="s1">

              </g>
              <!-- Sky: ▓▓▓ -->
              <g class="s2">
                <rect x="14" y="44" width="182" height="30" fill="#ff55ff"/>

              </g>
              <!-- Sky: ▒▒▒ -->
              <g class="s3">
                <rect x="14" y="74" width="182" height="30" fill="#ffff55"/>

              </g>
              <!-- Sky: ░░░ -->
              <g class="s4">
                <rect x="14" y="104" width="182" height="20" fill="#aaaaaa"/>
                <g opacity=".4"><rect x="14" y="104" width="182" height="2" fill="#0a0a0a"/><rect x="14" y="108" width="182" height="2" fill="#0a0a0a"/><rect x="14" y="112" width="182" height="2" fill="#0a0a0a"/><rect x="14" y="116" width="182" height="2" fill="#0a0a0a"/><rect x="14" y="120" width="182" height="2" fill="#0a0a0a"/></g>
                <g opacity=".3"><rect x="16" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="24" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="32" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="40" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="48" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="56" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="64" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="72" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="80" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="88" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="96" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="104" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="112" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="120" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="128" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="136" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="144" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="152" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="160" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="168" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="176" y="104" width="3" height="20" fill="#0a0a0a"/><rect x="184" y="104" width="3" height="20" fill="#0a0a0a"/></g>

              <!-- Flap -->
              <g class="fl">
                <rect x="40" y="148" width="130" height="1.5" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4"/>
                <rect x="40" y="165" width="130" height="1.5" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4"/>

              </g>
              <!-- YONDOOR -->
              <text class="nm" x="105" y="222" fill="#ffff55" font-family="'Courier New','Consolas',monospace" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="5">YONDOOR</text>
            </svg>

        <p class="tagline">Touch. Push. You're home.</p>

        <footer>
            <p>Yondoor &mdash; Yorkshire, England</p>
        </footer>

    </div>
</body>
</html>
