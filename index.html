<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yondoor — The door that knows you</title>
    <meta name="description" content="Open source smart door systems. NFC unlock, delivery flap, capacitive touch exit. No keys, no app, no cloud.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --muted: #888;
            --magenta: #aa00aa;
            --br-magenta: #ff55ff;
            --br-yellow: #ffff55;
            --white: #aaaaaa;
            --accent: #ff55ff;
            --accent-warm: #ffff55;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ASCII Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .logo img {
            max-width: 200px;
            width: 60%;
            height: auto;
        }

        /* Hero */
        .tagline {
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent-warm);
            margin-bottom: 3rem;
            letter-spacing: 0.05em;
        }

        /* Footer */
        footer {
            text-align: center;
            color: #444;
            font-size: 0.75rem;
            padding-top: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        footer a:hover {
            color: var(--text);
        }

    </style>
</head>
<body>
    <div class="container">

        <div class="logo">
            <img src="logo.svg" alt="Yondoor — a smart door with sky gradient and delivery flap">
        </div>

        <p class="tagline">Touch. Push. You're home.</p>

        <footer>
            <p>Yondoor &mdash; Yorkshire, England</p>
        </footer>

    </div>
</body>
</html>
