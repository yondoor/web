<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 260" width="210" height="260">
  <!-- Background -->
  <rect width="210" height="260" fill="#0a0a0a"/>

  <!-- Door frame -->
  <rect x="10" y="10" width="190" height="240" rx="4" fill="none" stroke="#555" stroke-width="3"/>

  <!-- Sky gradient bands -->
  <rect x="14" y="14" width="182" height="30" fill="#aa00aa"/>
  <rect x="14" y="44" width="182" height="30" fill="#ff55ff"/>
  <rect x="14" y="74" width="182" height="30" fill="#ffff55"/>
  <rect x="14" y="104" width="182" height="20" fill="#aaaaaa"/>

  <!-- Delivery flap -->
  <rect x="40" y="145" width="130" height="24" rx="2" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- YONDOOR text -->
  <text x="105" y="222" fill="#ffff55" font-family="'Courier New','Consolas',monospace" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="5">YONDOOR</text>
</svg>