<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 260" width="210" height="260">
  <style>
    @keyframes shimmer {
      0%   { opacity: 0.7; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }
    @keyframes flap-open {
      0%   { opacity: 0.4; }
      40%  { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0.4; }
    }
    @keyframes drift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }
    .sky1 { animation: shimmer 4s ease-in-out infinite; }
    .sky2 { animation: shimmer 4s ease-in-out 0.5s infinite; }
    .sky3 { animation: shimmer 4s ease-in-out 1s infinite; }
    .sky4 { animation: shimmer 4s ease-in-out 1.5s infinite; }
    .flap { animation: flap-open 6s ease-in-out infinite; }
    .name { animation: drift 8s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="210" height="260" fill="#0a0a0a"/>

  <!-- Door frame -->
  <rect x="10" y="10" width="190" height="240" rx="4" fill="none" stroke="#555" stroke-width="3"/>

  <!-- Sky gradient bands -->
  <rect class="sky1" x="14" y="14" width="182" height="30" fill="#aa00aa"/>
  <rect class="sky2" x="14" y="44" width="182" height="30" fill="#ff55ff"/>
  <rect class="sky3" x="14" y="74" width="182" height="30" fill="#ffff55"/>
  <rect class="sky4" x="14" y="104" width="182" height="20" fill="#aaaaaa"/>

  <!-- Delivery flap -->
  <rect class="flap" x="40" y="145" width="130" height="24" rx="2" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- YONDOOR text -->
  <text class="name" x="105" y="222" fill="#ffff55" font-family="'Courier New','Consolas',monospace" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="5">YONDOOR</text>
</svg>