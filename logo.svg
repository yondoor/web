<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 260" width="210" height="260">
  <style>
    @keyframes shimmer {
      0%   { opacity: 0.7; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }
    @keyframes flap-open {
      0%   { opacity: 0.4; }
      40%  { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0.4; }
    }
    @keyframes drift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }
    .sky1 { animation: shimmer 4s ease-in-out infinite; }
    .sky2 { animation: shimmer 4s ease-in-out 0.5s infinite; }
    .sky3 { animation: shimmer 4s ease-in-out 1s infinite; }
    .sky4 { animation: shimmer 4s ease-in-out 1.5s infinite; }
    .flap { animation: flap-open 6s ease-in-out infinite; }
    .name { animation: drift 8s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="210" height="260" fill="#0a0a0a"/>

  <!-- Door frame -->
  <rect x="10" y="10" width="190" height="240" rx="4" fill="none" stroke="#555" stroke-width="3"/>

  <!-- Sky band 1: dense blocks (███) -->
  <g class="sky1">
    <rect x="14" y="14" width="182" height="30" fill="#aa00aa"/>
    <!-- Scanline texture -->
    <rect x="14" y="16" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
    <rect x="14" y="20" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
    <rect x="14" y="24" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
    <rect x="14" y="28" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
    <rect x="14" y="32" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
    <rect x="14" y="36" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
    <rect x="14" y="40" width="182" height="1" fill="#0a0a0a" opacity="0.15"/>
  </g>

  <!-- Sky band 2: dark shade (▓▓▓) -->
  <g class="sky2">
    <rect x="14" y="44" width="182" height="30" fill="#ff55ff"/>
    <rect x="14" y="46" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <rect x="14" y="50" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <rect x="14" y="54" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <rect x="14" y="58" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <rect x="14" y="62" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <rect x="14" y="66" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <rect x="14" y="70" width="182" height="1" fill="#0a0a0a" opacity="0.2"/>
    <!-- Vertical dither -->
    <g opacity="0.12">
      <rect x="16" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="24" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="32" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="40" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="48" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="56" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="64" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="72" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="80" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="88" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="96" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="104" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="112" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="120" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="128" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="136" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="144" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="152" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="160" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="168" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="176" y="44" width="2" height="30" fill="#0a0a0a"/>
      <rect x="184" y="44" width="2" height="30" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- Sky band 3: medium shade (▒▒▒) -->
  <g class="sky3">
    <rect x="14" y="74" width="182" height="30" fill="#ffff55"/>
    <!-- Checkerboard dither pattern -->
    <g opacity="0.25">
      <rect x="14" y="74" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="78" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="82" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="86" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="90" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="94" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="98" width="182" height="2" fill="#0a0a0a"/>
    </g>
    <g opacity="0.15">
      <rect x="16" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="22" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="28" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="34" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="40" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="46" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="52" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="58" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="64" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="70" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="76" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="82" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="88" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="94" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="100" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="106" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="112" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="118" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="124" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="130" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="136" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="142" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="148" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="154" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="160" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="166" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="172" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="178" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="184" y="74" width="2" height="30" fill="#0a0a0a"/>
      <rect x="190" y="74" width="2" height="30" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- Sky band 4: light shade (░░░) -->
  <g class="sky4">
    <rect x="14" y="104" width="182" height="20" fill="#aaaaaa"/>
    <!-- Heavy dither = mostly background showing through -->
    <g opacity="0.4">
      <rect x="14" y="104" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="108" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="112" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="116" width="182" height="2" fill="#0a0a0a"/>
      <rect x="14" y="120" width="182" height="2" fill="#0a0a0a"/>
    </g>
    <g opacity="0.3">
      <rect x="16" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="24" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="32" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="40" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="48" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="56" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="64" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="72" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="80" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="88" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="96" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="104" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="112" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="120" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="128" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="136" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="144" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="152" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="160" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="168" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="176" y="104" width="3" height="20" fill="#0a0a0a"/>
      <rect x="184" y="104" width="3" height="20" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- Delivery flap (dashed like ╌ ╌ ╌) -->
  <g class="flap">
    <rect x="40" y="148" width="130" height="1.5" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4"/>
    <rect x="40" y="165" width="130" height="1.5" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="40" y1="148" x2="40" y2="166.5" stroke="#888" stroke-width="1.5"/>
    <line x1="170" y1="148" x2="170" y2="166.5" stroke="#888" stroke-width="1.5"/>
  </g>

  <!-- YONDOOR text -->
  <text class="name" x="105" y="222" fill="#ffff55" font-family="'Courier New','Consolas',monospace" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="5">YONDOOR</text>
</svg>